<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OWASP Top 10 — Break It. Understand It. Fix It.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--bg2:#0d1018;--bg3:#121620;--bg4:#181d28;--bg5:#1e2535;
  --bdr:#1c2236;--bdr2:#252e44;--bdr3:#2e3a54;
  --text:#dde4f0;--text2:#8d9ab8;--text3:#556080;--text4:#3a4660;
  --green:#2ecc8a;--green2:#1a9962;--green3:#0d4d31;
  --red:#e84040;--red2:#a82020;--red3:#3d0e0e;
  --amber:#f0a030;--amber2:#a86e10;--amber3:#3d2800;
  --blue:#4a9eff;--blue2:#1a5cbf;--blue3:#0a1f4d;
  --purple:#9b6bff;--cyan:#00d4e0;
  --mono:'IBM Plex Mono',monospace;
  --sans:'Syne',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* ===== HOMEPAGE ===== */
#home{min-height:100vh;display:flex;flex-direction:column}

.hero{padding:80px 40px 48px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(46,204,138,.06),transparent);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--green);border:1px solid var(--green3);background:rgba(46,204,138,.06);padding:5px 12px;border-radius:20px;margin-bottom:24px;letter-spacing:.5px}
.hero-badge::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-size:clamp(32px,5vw,56px);font-weight:800;line-height:1.1;letter-spacing:-1px;color:#fff;margin-bottom:12px}
.hero h1 span{color:var(--green)}
.hero-sub{font-size:clamp(14px,2vw,18px);color:var(--text2);margin-bottom:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.hero-desc{font-size:14px;color:var(--text3);max-width:520px;margin:0 auto 40px;line-height:1.8}

.vuln-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:0 40px 60px;max-width:1200px;margin:0 auto;width:100%}

.vcard{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.vcard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;transition:background .2s}
.vcard:hover{border-color:var(--bdr3);background:var(--bg4);transform:translateY(-2px)}
.vcard:hover::after{background:var(--green)}
.vcard.selected{border-color:var(--green2);background:var(--bg4)}
.vcard.selected::after{background:var(--green)}
.vcard-badge{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--green);background:var(--green3);padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:10px}
.vcard h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.vcard p{font-size:11px;color:var(--text3);line-height:1.5}
.vcard-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text4);font-size:16px;transition:all .2s}
.vcard:hover .vcard-arrow{color:var(--green);transform:translateY(-50%) translateX(2px)}

.start-btn{display:block;margin:0 40px 80px;max-width:300px;margin-left:auto;margin-right:auto;padding:14px 32px;background:var(--green);color:#000;font-family:var(--sans);font-size:15px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.start-btn:hover{background:var(--green2);color:#fff;transform:translateY(-1px)}
.start-btn:disabled{background:var(--bg4);color:var(--text4);cursor:not-allowed;transform:none}

/* ===== LAB PAGE ===== */
#lab{display:none;min-height:100vh;flex-direction:column}

.lab-nav{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:0;display:flex;align-items:stretch;position:sticky;top:0;z-index:100}
.lab-back{padding:14px 20px;font-size:12px;color:var(--text3);cursor:pointer;border-right:1px solid var(--bdr);display:flex;align-items:center;gap:6px;transition:color .15s;background:none;border-top:none;border-bottom:none;border-left:none;font-family:var(--sans)}
.lab-back:hover{color:var(--green)}
.lab-info{padding:14px 20px;flex:1}
.lab-info-badge{font-family:var(--mono);font-size:10px;color:var(--green);margin-bottom:2px}
.lab-info-title{font-size:14px;font-weight:700;color:var(--text)}
.lab-progress{display:flex;align-items:center;gap:4px;padding:14px 20px}
.prog-dot{width:8px;height:8px;border-radius:50%;background:var(--bdr3);transition:background .3s}
.prog-dot.active{background:var(--green)}
.prog-dot.done{background:var(--green2)}

.lab-body{flex:1;display:grid;grid-template-columns:1fr;gap:0}

/* SECTION TABS */
.section-tabs{display:flex;border-bottom:1px solid var(--bdr);overflow-x:auto;background:var(--bg2)}
.stab{padding:14px 20px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans);display:flex;align-items:center;gap:6px;letter-spacing:.3px}
.stab:hover{color:var(--text2)}
.stab.active{color:var(--text);border-bottom-color:var(--green)}
.stab-num{font-family:var(--mono);font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bdr3);color:var(--text3)}
.stab.active .stab-num{background:var(--green);color:#000}
.stab.done .stab-num{background:var(--green3);color:var(--green)}

.section-content{padding:32px 40px;max-width:860px;margin:0 auto;width:100%;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SECTION HEADERS */
.sec-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.sec-sub{font-size:13px;color:var(--text3);margin-bottom:28px}

/* INFO BOXES */
.info-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:20px 24px;margin-bottom:16px}
.info-label{font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;font-family:var(--mono)}
.info-text{font-size:13px;color:var(--text2);line-height:1.8}
.info-text strong{color:var(--text)}
.info-highlight{background:var(--bg4);border:1px solid var(--bdr2);border-radius:6px;padding:14px 18px;font-family:var(--mono);font-size:12px;color:var(--cyan);margin-top:12px;line-height:1.7}
.highlight-red{color:var(--red)}
.highlight-green{color:var(--green)}
.highlight-amber{color:var(--amber)}

/* TERMINAL */
.terminal{background:#040608;border:1px solid var(--bdr);border-radius:8px;overflow:hidden;margin-bottom:16px}
.term-hdr{background:var(--bg4);padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bdr)}
.tdot{width:10px;height:10px;border-radius:50%}
.term-title{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:4px}
.term-body{padding:16px;font-family:var(--mono);font-size:12px;line-height:2}
.t-prompt{color:var(--green);margin-right:4px}
.t-cmd{color:var(--text)}
.t-key{color:var(--cyan)}
.t-val{color:var(--amber)}
.t-ok{color:var(--green)}
.t-err{color:var(--red)}
.t-cmt{color:var(--text3)}
.t-url{color:var(--blue)}

/* INPUTS */
.sim-row{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.sim-input{background:var(--bg3);border:1px solid var(--bdr2);border-radius:6px;padding:10px 14px;color:var(--amber);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s;flex:1;min-width:0}
.sim-input:focus{border-color:var(--amber)}
.sim-input::placeholder{color:var(--text4)}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--sans);transition:all .15s;letter-spacing:.3px;white-space:nowrap}
.btn-red{background:var(--red2);color:#fff}
.btn-red:hover{background:var(--red)}
.btn-green{background:var(--green3);color:var(--green);border:1px solid var(--green2)}
.btn-green:hover{background:rgba(46,204,138,.15)}
.btn-amber{background:var(--amber3);color:var(--amber);border:1px solid var(--amber2)}
.btn-amber:hover{background:rgba(240,160,48,.12)}
.btn-gray{background:var(--bg4);color:var(--text2);border:1px solid var(--bdr2)}
.btn-gray:hover{background:var(--bg5);color:var(--text)}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* RESULT */
.result{border-radius:8px;padding:14px 18px;font-family:var(--mono);font-size:12px;line-height:1.8;margin-top:14px;display:none;animation:fadein .2s ease}
.result.show{display:block}
.result.success{background:rgba(46,204,138,.07);border:1px solid var(--green2);color:var(--green)}
.result.fail{background:var(--red3);border:1px solid var(--red2);color:var(--red)}
.result.info{background:var(--blue3);border:1px solid var(--blue2);color:var(--blue)}
.result.warn{background:var(--amber3);border:1px solid var(--amber2);color:var(--amber)}

/* TOGGLE */
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr)}
.tog-label{font-size:13px;color:var(--text2)}
.tog{position:relative;width:38px;height:22px}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--bdr3);border-radius:11px;cursor:pointer;transition:.2s}
.tog-track::before{content:'';position:absolute;height:16px;width:16px;left:3px;top:3px;background:var(--text3);border-radius:50%;transition:.2s}
.tog input:checked+.tog-track{background:var(--green2)}
.tog input:checked+.tog-track::before{transform:translateX(16px);background:var(--green)}

/* CHALLENGE */
.challenge-box{background:var(--bg3);border:1px solid var(--bdr2);border-radius:10px;padding:24px;margin-bottom:20px}
.challenge-task{font-size:14px;color:var(--text);line-height:1.8;margin-bottom:20px}
.challenge-task::before{content:'Task: ';color:var(--amber);font-weight:700;font-family:var(--mono)}
.answer-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.answer-input{flex:1;min-width:0;background:var(--bg4);border:1px solid var(--bdr2);border-radius:6px;padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;resize:vertical;min-height:60px}
.answer-input:focus{border-color:var(--blue2)}
.check-result{padding:12px 16px;border-radius:6px;font-size:13px;line-height:1.6;margin-top:12px;display:none}
.check-result.show{display:block}
.check-result.correct{background:rgba(46,204,138,.07);border:1px solid var(--green2);color:var(--green)}
.check-result.partial{background:var(--amber3);border:1px solid var(--amber2);color:var(--amber)}
.check-result.wrong{background:var(--red3);border:1px solid var(--red2);color:var(--red)}
.hint-btn{font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:var(--sans);margin-top:8px;display:inline-block}
.hint-btn:hover{color:var(--text2)}
.hint-text{display:none;font-size:12px;color:var(--text3);margin-top:8px;padding:10px;background:var(--bg4);border-radius:6px;font-style:italic;line-height:1.6}
.hint-text.show{display:block}

/* CODE BLOCK */
.code-block{background:#040608;border:1px solid var(--bdr);border-radius:8px;padding:18px;font-family:var(--mono);font-size:12px;line-height:2;overflow-x:auto;margin-bottom:16px}
.kw{color:var(--purple)}.fn{color:var(--cyan)}.str{color:var(--amber)}.cmt{color:var(--text3)}.var{color:var(--green)}.num{color:var(--blue)}

.defense-point{display:flex;gap:12px;margin-bottom:12px;font-size:13px;color:var(--text2);line-height:1.7}
.defense-point::before{content:'▸';color:var(--green);font-size:14px;margin-top:2px;flex-shrink:0}

/* SECTION NEXT */
.sec-nav{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:20px;border-top:1px solid var(--bdr)}
.sec-nav-label{font-size:11px;color:var(--text3)}

/* COMPARE TABLE */
.compare{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono);margin-bottom:16px}
.compare th{background:var(--bg4);color:var(--text2);padding:10px 14px;text-align:left;border-bottom:1px solid var(--bdr2);font-weight:600}
.compare td{padding:10px 14px;border-bottom:1px solid var(--bdr);color:var(--text3)}
.compare tr:hover td{background:var(--bg3)}
.compare .bad{color:var(--red)}
.compare .good{color:var(--green)}

/* STATUS STEPS */
.flow-steps{display:flex;flex-direction:column;gap:0;margin-bottom:16px}
.flow-step{display:flex;align-items:center;gap:12px;padding:10px 14px;border-left:2px solid var(--bdr2);font-size:12px;color:var(--text3);transition:all .3s;margin-left:10px}
.flow-step.active{border-left-color:var(--red);color:var(--red);background:var(--red3)}
.flow-step.secure{border-left-color:var(--green2);color:var(--green);background:rgba(46,204,138,.05)}
.flow-step-num{font-family:var(--mono);font-size:10px;min-width:20px}

/* BRUTE FORCE LOG */
#brute-log{max-height:120px;overflow-y:auto;font-family:var(--mono);font-size:11px;line-height:1.8;background:#040608;border:1px solid var(--bdr);border-radius:6px;padding:10px;margin-bottom:10px}
#brute-log div{animation:fadein .1s ease}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr3);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--bdr2)}

/* RESPONSIVE */
@media(max-width:640px){
  .hero{padding:48px 20px 32px}
  .vuln-grid{padding:0 16px 40px;grid-template-columns:1fr 1fr}
  .section-content{padding:20px}
  .start-btn{margin:0 16px 48px}
  .sim-row{flex-direction:column}
  .sim-input,.btn{width:100%}
}
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div id="home">
  <div class="hero">
    <div class="hero-badge">🔒 Security Education Platform</div>
    <h1>OWASP Top 10<br><span>Web Vulnerabilities</span></h1>
    <div class="hero-sub">Break It. Understand It. Fix It.</div>
    <p class="hero-desc">Learn the most critical web security risks through real-world simulations and hands-on challenges.</p>
  </div>

  <div class="vuln-grid" id="vuln-grid"></div>

  <button class="start-btn" id="start-btn" disabled onclick="startLab()">
    Select a vulnerability to begin →
  </button>
</div>

<!-- ===== LAB ===== -->
<div id="lab" style="display:none">
  <nav class="lab-nav">
    <button class="lab-back" onclick="goHome()">← Back</button>
    <div class="lab-info">
      <div class="lab-info-badge" id="lab-badge">A01</div>
      <div class="lab-info-title" id="lab-title">Broken Access Control</div>
    </div>
    <div class="lab-progress" id="lab-progress"></div>
  </nav>

  <div class="section-tabs">
    <button class="stab active" onclick="showTab(0)" id="tab-0"><span class="stab-num">1</span> Explanation</button>
    <button class="stab" onclick="showTab(1)" id="tab-1"><span class="stab-num">2</span> Simulation</button>
    <button class="stab" onclick="showTab(2)" id="tab-2"><span class="stab-num">3</span> Challenge</button>
    <button class="stab" onclick="showTab(3)" id="tab-3"><span class="stab-num">4</span> Fix It</button>
  </div>

  <div id="tab-content-0" class="section-content"></div>
  <div id="tab-content-1" class="section-content" style="display:none"></div>
  <div id="tab-content-2" class="section-content" style="display:none"></div>
  <div id="tab-content-3" class="section-content" style="display:none"></div>
</div>

<script>
const VULNS = [
  {
    badge:'A01',name:'Broken Access Control',short:'IDOR',
    tagline:'Users access data they shouldn\'t see',
    explanation:{
      what:'A user can access or modify another user\'s data simply by changing a parameter — because the server never checks ownership.',
      example:'User A is logged in. Their profile URL is /profile?id=101. By changing id=101 to id=102, they see User B\'s private data.',
      where:'Any endpoint where user-supplied IDs are used to fetch data, without verifying the requesting user owns that data.'
    },
    challenge:{
      task:'Use the simulation to access another user\'s profile. Then answer: Which user IDs did you discover data for? What did the server NOT check?',
      hints:['Try changing the ID in the input field','The server only checks if you are logged in, not if the data belongs to you','IDs 102, 103, and 104 belong to other users'],
      check:(ans)=>{
        const a=ans.toLowerCase();
        const hasId = /10[2-4]/.test(a)||a.includes('102')||a.includes('103')||a.includes('104');
        const hasReason = a.includes('own')||a.includes('check')||a.includes('authori')||a.includes('verif')||a.includes('session')||a.includes('belong');
        if(hasId&&hasReason) return {grade:'correct',msg:"Correct! You identified the vulnerability (changed an ID and got someone else's data) and the root cause (no ownership check). That's IDOR in a nutshell."};
        if(hasId) return {grade:'partial',msg:"You found the right IDs — but also explain WHY it worked. What did the server fail to check?"};
        return {grade:'wrong',msg:"Try using the simulation first. Change the ID field to 102, 103, or 104 and observe the response."};
      }
    },
    fix:{
      summary:'On every data request, the server must verify that the authenticated user actually owns the requested resource.',
      pseudo:`<span class="cmt"># VULNERABLE — trusts the user's input</span>
<span class="kw">def</span> <span class="fn">get_profile</span>(requested_id):
    <span class="kw">return</span> db.get_user(requested_id)  <span class="cmt"># no check!</span>

<span class="cmt"># SECURE — server enforces ownership</span>
<span class="kw">def</span> <span class="fn">get_profile</span>(requested_id, session):
    <span class="kw">if</span> session.user_id != requested_id:
        <span class="kw">raise</span> <span class="fn">HTTP_403_Forbidden</span>()
    <span class="kw">return</span> db.get_user(requested_id)`,
      points:['Never trust client-supplied IDs for authorization decisions','Always cross-check the requested resource owner against the session user','Use indirect reference maps (tokens) instead of direct database IDs','Apply authorization checks at the server, never the client']
    }
  },
  {
    badge:'A02',name:'Security Misconfiguration',short:'Misconfig',
    tagline:'Insecure defaults leave the door wide open',
    explanation:{
      what:'The application uses default, weak, or overly permissive settings — making it trivially easy for attackers to break in.',
      example:'An admin panel ships with username "admin" and password "admin". No one changed it. An attacker logs in immediately.',
      where:'Admin portals, server configs, cloud storage buckets, debug endpoints, HTTP headers — anywhere defaults are left unchanged.'
    },
    challenge:{
      task:'Log in to the admin panel in the simulation. What credentials worked? Why was this possible — what did the developers forget to do?',
      hints:['Try the most common default admin credentials','Think about what a developer should do before deploying to production'],
      check:(ans)=>{
        const a=ans.toLowerCase();
        const hasCreds = (a.includes('admin')&&(a.includes('admin')||a.includes('password')))||a.includes('admin/admin')||a.includes('admin:admin');
        const hasWhy = a.includes('default')||a.includes('change')||a.includes('produc')||a.includes('hardened')||a.includes('forgot');
        if(hasCreds&&hasWhy) return {grade:'correct',msg:'Correct! Default credentials (admin/admin) were never changed before deployment. This is one of the most common and easily prevented vulnerabilities in real systems.'};
        if(hasCreds) return {grade:'partial',msg:'You found the credentials. Now explain: what should the developers have done before going live?'};
        return {grade:'wrong',msg:'Hint: Try "admin" as both username and password. Then think about why this worked on a real system.'};
      }
    },
    fix:{
      summary:'Harden every configuration before deployment. Remove defaults, disable what you don\'t need, and enforce secure settings.',
      pseudo:`<span class="cmt"># Deployment checklist (pseudocode)</span>
<span class="kw">assert</span> admin_password != <span class="str">"admin"</span>
<span class="kw">assert</span> debug_mode == <span class="var">False</span>
<span class="kw">assert</span> error_verbosity == <span class="str">"minimal"</span>
<span class="kw">assert</span> unused_ports.is_empty()
<span class="kw">assert</span> security_headers.are_set()`,
      points:['Change ALL default credentials before going live','Disable debug mode and verbose error messages in production','Remove unused features, default accounts, and sample apps','Set proper security headers (CSP, X-Frame-Options, HSTS)','Automate hardening checks in your deployment pipeline']
    }
  },
  {
    badge:'A03',name:'Software Supply Chain Failures',short:'SCA',
    tagline:'Your dependencies can be your biggest backdoor',
    explanation:{
      what:'Your application imports third-party libraries. If one of those libraries is malicious, outdated, or compromised, attackers can exploit it to harm your users.',
      example:'You install "lodahs" thinking it\'s a utility. It\'s actually a typosquatted package that runs malware on install.',
      where:'npm packages, pip libraries, Maven dependencies, CDN scripts — any external code your app runs.'
    },
    challenge:{
      task:'In the simulation, a vulnerable dependency is highlighted. Explain what makes it dangerous — what attack does it enable, and how should a developer have caught it?',
      hints:['Look at the package name carefully — is it what it seems?','Think about what runs when you install a package (postinstall scripts)','Version pinning and hash verification help catch tampered packages'],
      check:(ans)=>{
        const a=ans.toLowerCase();
        const hasAttack = a.includes('malicious')||a.includes('backdoor')||a.includes('typo')||a.includes('script')||a.includes('postinstall')||a.includes('remote')||a.includes('code')||a.includes('rce');

    },

flask
lodahs          <span class="cmt"># typosquatted malicious package!</span>

<span class="cmt"># requirements.txt — SECURE</span>
requests==<span class="num">2.31.0</span> --hash=sha256:abc123...

let selectedVuln = null;
let currentTab = 0;
let completedTabs = new Set();
let bruteTimer = null;

// ===== HOME =====
function renderHome(){
  const grid = document.getElementById('vuln-grid');
  grid.innerHTML = VULNS.map((v,i)=>`
    <div class="vcard" id="vcard-${i}" onclick="selectVuln(${i})">
      <div class="vcard-badge">${v.badge}</div>
      <h3>${v.name}</h3>
      <p>${v.tagline}</p>
      <span class="vcard-arrow">→</span>
    </div>`).join('');
}

function selectVuln(i){
  selectedVuln = i;
  document.querySelectorAll('.vcard').forEach((c,j)=>c.classList.toggle('selected',j===i));
  const btn = document.getElementById('start-btn');
  btn.disabled = false;
  btn.textContent = `Explore ${VULNS[i].badge}: ${VULNS[i].name} →`;
}

function startLab(){
  if(selectedVuln===null) return;
  document.getElementById('home').style.display='none';
  const lab = document.getElementById('lab');
  lab.style.display='flex';
  lab.style.flexDirection='column';
  completedTabs = new Set();
  currentTab = 0;
  loadLab(selectedVuln);
}

function goHome(){
  document.getElementById('lab').style.display='none';
  document.getElementById('home').style.display='flex';
  document.getElementById('home').style.flexDirection='column';
  if(bruteTimer) clearInterval(bruteTimer);
}

// ===== LAB =====
function loadLab(i){
  const v = VULNS[i];
  document.getElementById('lab-badge').textContent = v.badge;
  document.getElementById('lab-title').textContent = v.name;
  renderProgress();
  showTab(0);
  renderTab(0,v);
}

function renderProgress(){
  const prog = document.getElementById('lab-progress');
  prog.innerHTML = [0,1,2,3].map(i=>`<div class="prog-dot ${completedTabs.has(i)?'done':currentTab===i?'active':''}" id="pd-${i}"></div>`).join('');
}

function showTab(n){
  [0,1,2,3].forEach(i=>{
    document.getElementById('tab-content-'+i).style.display = i===n?'block':'none';
    const t = document.getElementById('tab-'+i);
    t.classList.toggle('active',i===n);
    t.classList.toggle('done',completedTabs.has(i)&&i!==n);
  });
  currentTab = n;
  renderProgress();
  renderTab(n, VULNS[selectedVuln]);
}

function markDone(tab){
  completedTabs.add(tab);
  document.getElementById('pd-'+tab).classList.replace('active','done');
  document.getElementById('tab-'+tab).classList.add('done');
}

function renderTab(n, v){
  const el = document.getElementById('tab-content-'+n);
  if(n===0) el.innerHTML = renderExplanation(v);
  else if(n===1) el.innerHTML = renderSim(v);
  else if(n===2) el.innerHTML = renderChallenge(v);
  else if(n===3) el.innerHTML = renderFix(v);
}

// ===== EXPLANATION =====
function renderExplanation(v){
  return `
    <div class="sec-title">${v.badge}: ${v.name}</div>
    <div class="sec-sub">What it is, how it works, and where it appears</div>

    <div class="info-card">
      <div class="info-label">What it is</div>
      <div class="info-text">${v.explanation.what}</div>
    </div>
    <div class="info-card">
      <div class="info-label">A simple example</div>
      <div class="info-text">${v.explanation.example}</div>
    </div>
    <div class="info-card">
      <div class="info-label">Where it happens</div>
      <div class="info-text">${v.explanation.where}</div>
    </div>

    <div class="sec-nav">
      <span class="sec-nav-label">Section 1 of 4</span>
      <button class="btn btn-green" onclick="showTab(1);markDone(0)">Next: Simulation →</button>
    </div>`;
}

// ===== SIMULATIONS =====
function renderSim(v){
  const sims = {
    'A01': renderSimIDOR(),
    'A02': renderSimMisconfig(),

      <button class="btn btn-gray" onclick="clearSIEM()">Clear Log</button>
    </div>
    <div class="result" id="log-result"></div>`;
}

function runLogging(){
  const logOn = document.getElementById('log-toggle').checked;
  const siemOn = document.getElementById('siem-toggle').checked;
  const out = document.getElementById('siem-output');
  const r = document.getElementById('log-result');
  if(!logOn){
    out.innerHTML='<div class="t-cmt"># Attack in progress...</div><div class="t-cmt"># ...</div><div class="t-cmt"># ...</div><div class="t-cmt"># Attack complete. No events logged.</div>';
    r.className='result success show';
    r.innerHTML=`⚠ ATTACK UNDETECTED\n\nEvents that occurred (but were NOT logged):\n  × 47 failed login attempts from 198.51.100.4\n  × SQL injection strings in 12 requests\n  × 50MB of user data exported\n  × Privilege escalation to admin role\n\nAttacker dwell time: 89 days before accidental discovery.`;
  } else {
    const events=[
      '<span class="t-err">[WARN]</span> Auth failure: admin from 198.51.100.4',
      '<span class="t-err">[WARN]</span> Auth failure: admin from 198.51.100.4 (×47)',
      '<span class="t-err">[CRIT]</span> SQLi pattern detected in login username field',
      '<span class="t-err">[CRIT]</span> Unusual data volume: 50MB exported by user admin',
      '<span class="t-ok">[INFO]</span> Incident response triggered — IP blocked',
      siemOn?'<span class="t-ok">[ALERT]</span> SIEM: brute force threshold exceeded — SOC notified':'<span class="t-err">[MISS]</span> Threshold exceeded but no SIEM alert configured'
    ];
    out.innerHTML = events.map(e=>`<div>${e}</div>`).join('');
    r.className='result info show';
    r.innerHTML=`✓ Attack DETECTED via logs\n\nEvents captured: 6\nTime to detection: ~2 minutes\n${siemOn?'SOC team alerted — investigation opened':'Events logged, but no alerts fired — manual review required'}`;
  }
}

function clearSIEM(){
  document.getElementById('siem-output').innerHTML='<div class="t-cmt"># Log cleared</div>';
  document.getElementById('log-result').className='result';
}

function renderSimException(){
  return `
    <div class="terminal">
      <div class="term-hdr"><div class="tdot" style="background:#ff5f57"></div><div class="term-title">Bank Transfer API — POST /api/transfer</div></div>
      <div class="term-body">
        <div>{</div>
        <div>  <span class="t-key">"from"</span>: <span class="t-val">"account_A"</span>,</div>
        <div>  <span class="t-key">"to"</span>: <span class="t-val">"account_B"</span>,</div>
        <div>  <span class="t-key">"amount"</span>: <input id="exc-amount" class="sim-input" value="-50000" style="width:120px;display:inline-block;padding:2px 6px"></div>
        <div>}</div>
      </div>
    </div>
    <div class="info-card" style="margin-bottom:14px">
      <div class="info-label">Server-side code (vulnerable)</div>
      <div class="code-block" style="margin:0">
<span class="t-key">try</span>:
    debit_account(from, amount)
    credit_account(to, amount)
    <span class="t-ok">return success()</span>
<span class="t-key">except</span> Exception:
    <span class="t-err">return success()</span>  <span class="t-cmt"># BUG: fail-open!</span></div>
    </div>
    <div class="sim-row">
      <button class="btn btn-red" onclick="runException(false)">Send Transfer (Vulnerable)</button>
      <button class="btn btn-green" onclick="runException(true)">Send Transfer (Secure)</button>
    </div>
    <div class="result" id="exc-result"></div>`;
}

function runException(secure){
  const amount = parseFloat(document.getElementById('exc-amount').value||0);
  const r = document.getElementById('exc-result');
  if(secure){
    if(amount<=0||amount>100000||isNaN(amount)){
      r.className='result info show';
      r.innerHTML=`✓ Input validated — transfer REJECTED\n\nAmount ${amount} is invalid (must be 0.01–100,000)\n\nHTTP 400: {"error": "Invalid transfer amount"}\n\nException catch block: logs error → returns FAIL\nFail-closed behavior: error = deny, not approve.`;
    } else {
      r.className='result info show';
      r.innerHTML=`✓ Transfer processed normally.\n\nAmount: $${amount.toFixed(2)}\nStatus: Completed\nThis is a valid transaction.`;
    }
  } else {
    if(amount<0||isNaN(amount)){
      r.className='result success show';
      r.innerHTML=`⚠ EXCEPTION — FAIL-OPEN BUG!\n\nAmount: ${amount} → ArithmeticException thrown\ndebit_account(account_A, ${amount}) → error!\n\nexcept Exception:\n    return success()  ← executed!\n\nResult: Transfer "succeeded"\nAccount B credited: $${Math.abs(amount).toLocaleString()}\nAccount A debited: $0 (exception skipped the debit)\n\nAttacker's balance increased by $${Math.abs(amount).toLocaleString()} for free.`;
    } else {
      r.className='result info show';
      r.innerHTML=`Normal transfer of $${amount.toFixed(2)} — no exception triggered.\n\nTry a negative value (like -50000) to trigger the bug.`;
    }
  }
}

function renderChallenge(v){
  return `
    <div class="sec-title">Student Challenge</div>
    <div class="sec-sub">Answer in your own words to confirm your understanding</div>
    <div class="challenge-box">
      <div class="challenge-task">${v.challenge.task}</div>
      <div class="answer-row">
        <textarea class="answer-input" id="student-answer" placeholder="Type your answer here..."></textarea>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
        <button class="btn btn-green" onclick="checkAnswer()">Check Answer</button>
        <button class="hint-btn" onclick="toggleHint()">Show hint ▾</button>
      </div>
      <div class="hint-text" id="hint-text">${v.challenge.hints.map(h=>`• ${h}`).join('<br>')}</div>
      <div class="check-result" id="check-result"></div>
    </div>
    <div class="sec-nav">
      <button class="btn btn-gray" onclick="showTab(1)">← Back</button>
      <button class="btn btn-green" onclick="showTab(3);markDone(2)" id="next-to-fix">Next: Fix It →</button>
    </div>`;
}

function checkAnswer(){
  const ans = document.getElementById('student-answer').value.trim();
  if(ans.length < 10){
    const r=document.getElementById('check-result');
    r.className='check-result partial show';
    r.innerHTML='Please write a more detailed answer (at least a sentence or two).';
    return;
  }
  const v = VULNS[selectedVuln];
  const result = v.challenge.check(ans);
  const r = document.getElementById('check-result');
  const icons = {correct:'✓ ', partial:'◑ ', wrong:'✗ '};
  r.className=`check-result ${result.grade} show`;
  r.innerHTML = icons[result.grade] + result.msg;
  if(result.grade==='correct') markDone(2);
}

function toggleHint(){
  const h = document.getElementById('hint-text');
  h.classList.toggle('show');
  const btn = document.querySelector('.hint-btn');
  btn.textContent = h.classList.contains('show') ? 'Hide hint ▴' : 'Show hint ▾';
}
